name: Update Resume from CV Repo

on:
  repository_dispatch:
    types: [update-resume]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-resume:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download web CV from CV-Naya
        run: |
          curl -L \
            -H "Accept: application/vnd.github.v3.raw" \
            -H "Authorization: Bearer ${{ secrets.CV_REPO_PAT }}" \
            -o public/resume.pdf \
            "https://api.github.com/repos/nayafyt/CV-Naya/contents/naya_cv_web.pdf?ref=main"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/resume.pdf
          git diff --cached --quiet || git commit -m "Update resume PDF from CV-Naya"
          git push
