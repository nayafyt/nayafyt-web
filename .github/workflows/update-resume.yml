name: Update Resume from CV Repo

on:
  repository_dispatch:
    types: [update-resume]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  update-resume:
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.commit.outputs.changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download web CV from CV-Naya
        run: |
          curl -L --fail \
            -H "Accept: application/vnd.github.v3.raw" \
            -H "Authorization: Bearer ${{ secrets.CV_REPO_PAT }}" \
            -o public/resume.pdf \
            "https://api.github.com/repos/nayafyt/CV-Naya/contents/naya_cv_web.pdf?ref=main"

      - name: Commit and push
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/resume.pdf
          if git diff --cached --quiet; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "Update resume PDF from CV-Naya"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

  build-and-deploy:
    needs: update-resume
    if: needs.update-resume.outputs.changed == 'true'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
